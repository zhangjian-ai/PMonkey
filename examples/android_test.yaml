platform: android
device_id: 45170DLAQ001LL
app_package: com.merge.foodie.cooking.restaurant

event_ratios:
  tap: 0.6
  swipe: 0.4

interval_ms: 100
duration_seconds: 180
#event_count: 500

# Swipe gesture duration range in milliseconds (uniformly sampled per swipe)
swipe_duration:
  min_ms: 50
  max_ms: 100

bounds:
  x_min: 30
  x_max: 1050
  y_min: 700
  y_max: 2030

# 可选：禁区配置（避开特定区域）
# 所有 tap 和 swipe 的起点/终点都会避开这些区域
# 适用场景：状态栏、导航栏、退出按钮等敏感区域
#exclusion_zones:
#  # 顶部状态栏
#  - x_min: 0
#    x_max: 1080
#    y_min: 0
#    y_max: 100
#  # 底部导航栏
#  - x_min: 0
#    x_max: 1080
#    y_min: 2200
#    y_max: 2340
#  - x_min: 0
#    x_max: 1080
#    y_min: 700
#    y_max: 1300

monitoring:
  enabled: true
  sample_interval_seconds: 1
  metrics:
    - cpu
    - memory
    - fps
    - battery

stability:
  monitor_crashes: true
  monitor_anr: true
  monitor_errors: true
  continue_on_crash: true
  continue_on_anr: true
  anr_threshold_seconds: 3.0
  max_crash_count: 1

report:
  output_path: ./report.html
  include_raw_data: true
