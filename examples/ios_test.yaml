platform: ios
device_id: 00008101-001971E83C92001E  # Replace with your device UDID
app_package: com.merge.foodie.cooking.restaurant

event_ratios:
  tap: 0.7
  swipe: 0.3

interval_ms: 200
duration_seconds: 180
#event_count: 500

# Swipe gesture duration range in milliseconds (uniformly sampled per swipe)
swipe_duration:
  min_ms: 50
  max_ms: 100

bounds:
  x_min: 15
  x_max: 415
  y_min: 350
  y_max: 750

# 可选：禁区配置（避开特定区域）
# 所有 tap 和 swipe 的起点/终点都会避开这些区域
# 适用场景：状态栏、导航栏、退出按钮等敏感区域
#exclusion_zones:
#  # 顶部状态栏（刘海区域）
#  - x_min: 0
#    x_max: 390
#    y_min: 0
#    y_max: 50
#  # 底部 Home Indicator 区域
#  - x_min: 0
#    x_max: 390
#    y_min: 800
#    y_max: 844

monitoring:
  enabled: true
  sample_interval_seconds: 1
  metrics:  # 未使用字段
    - cpu
    - memory
    - fps
    - battery

stability:
  monitor_crashes: true
  monitor_anr: false  # ANR is Android-specific
  monitor_errors: true
  continue_on_crash: true
  max_crash_count: 1

report:
  output_path: ./ios_report.html
  include_raw_data: true  # 未使用字段
